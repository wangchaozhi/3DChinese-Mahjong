name: Godot CI

on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  GODOT_VERSION: "4.7"
  GODOT_STATUS: stable
  GODOT_VERSION_DIR: "4.7.stable"
  GODOT_DOWNLOAD_BASE: https://github.com/godotengine/godot-builds/releases/download/4.7-stable
  PRODUCT_SLUG: 3d-chinese-mahjong
  ANDROID_APP_NAME: 3D Chinese Mahjong
  ANDROID_PACKAGE_NAME: ${{ vars.ANDROID_PACKAGE_NAME || 'com.wangchaozhi.threedchinesemahjong' }}
  ANDROID_VERSION_CODE: ${{ github.run_number }}
  APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID || secrets.APPLE_TEAM_ID || 'ABCDE12345' }}
  MACOS_BUNDLE_ID: ${{ vars.MACOS_BUNDLE_ID || 'com.wangchaozhi.3dchinesemahjong.macos' }}
  MACOS_CODESIGN_MODE: ${{ vars.MACOS_CODESIGN_MODE || '1' }}
  IOS_BUNDLE_ID: ${{ vars.IOS_BUNDLE_ID || 'com.wangchaozhi.3dchinesemahjong.ios' }}
  IOS_BUILD_IPA: ${{ vars.IOS_BUILD_IPA || 'true' }}
  IOS_EXPORT_PROJECT_ONLY: "true"
  IOS_EXPORT_METHOD_RELEASE: ${{ vars.IOS_EXPORT_METHOD_RELEASE || '2' }}
  IOS_PROFILE_UUID_RELEASE: ${{ vars.IOS_PROFILE_UUID_RELEASE || secrets.IOS_PROFILE_UUID_RELEASE }}
  IOS_PROFILE_SPECIFIER_RELEASE: ${{ vars.IOS_PROFILE_SPECIFIER_RELEASE || secrets.IOS_PROFILE_SPECIFIER_RELEASE }}

jobs:
  validate:
    name: Validate project
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Godot
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --retry 3 --retry-delay 2 "${GODOT_DOWNLOAD_BASE}/Godot_v${GODOT_VERSION}-${GODOT_STATUS}_linux.x86_64.zip" -o godot.zip
          unzip -q godot.zip -d godot-bin
          mv godot-bin/Godot_v${GODOT_VERSION}-${GODOT_STATUS}_linux.x86_64 godot
          chmod +x godot

      - name: Show Godot version
        run: ./godot --version

      - name: Import and parse scripts
        run: ./godot --headless --path . --import --quit-after 2

      - name: Autoplay regression
        run: MJ_AUTOPLAY=1 ./godot --headless --path . --quit-after 200000

  export-release:
    name: Export ${{ matrix.name }}
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.runner }}
    needs: validate
    timeout-minutes: 30
    continue-on-error: ${{ matrix.allow_failure }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            runner: ubuntu-latest
            godot_host: linux
            preset: Windows Desktop
            export_path: build/windows/3DChineseMahjong.exe
            package_suffix: windows-x86_64
            allow_failure: false
            needs_android: false
            needs_apple_signing: false
          - name: Linux
            runner: ubuntu-latest
            godot_host: linux
            preset: Linux/X11
            export_path: build/linux/3DChineseMahjong.x86_64
            package_suffix: linux-x86_64
            allow_failure: false
            needs_android: false
            needs_apple_signing: false
          - name: Web
            runner: ubuntu-latest
            godot_host: linux
            preset: Web
            export_path: build/web/index.html
            package_suffix: web
            allow_failure: true
            needs_android: false
            needs_apple_signing: false
          - name: macOS
            runner: macos-latest
            godot_host: macos
            preset: macOS
            export_path: build/macos/3DChineseMahjong-macOS.zip
            package_suffix: macos-universal
            allow_failure: true
            needs_android: false
            needs_apple_signing: false
          - name: Android
            runner: ubuntu-latest
            godot_host: linux
            preset: Android
            export_path: build/android/3DChineseMahjong.apk
            package_suffix: android-arm64-apk
            allow_failure: true
            needs_android: true
            needs_apple_signing: false
          - name: iOS
            runner: macos-latest
            godot_host: macos
            preset: iOS
            export_path: build/ios/3DChineseMahjong-iOS.zip
            package_suffix: ios-xcode
            allow_failure: true
            needs_android: false
            needs_apple_signing: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java for Android
        if: matrix.needs_android
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Android SDK packages
        if: matrix.needs_android
        shell: bash
        run: |
          set -euo pipefail
          export PATH="${ANDROID_HOME}/cmdline-tools/latest/bin:${ANDROID_HOME}/cmdline-tools/tools/bin:${ANDROID_HOME}/platform-tools:${PATH}"
          set +o pipefail
          yes | sdkmanager --licenses >/dev/null
          license_status="${PIPESTATUS[1]}"
          set -o pipefail
          if [ "${license_status}" -ne 0 ]; then
            exit "${license_status}"
          fi
          sdkmanager \
            "platform-tools" \
            "build-tools;35.0.1" \
            "platforms;android-35" \
            "cmdline-tools;latest" \
            "cmake;3.10.2.4988404" \
            "ndk;28.1.13356709"

      - name: Install Godot and export templates
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.godot_host }}" = "macos" ]; then
            curl --fail --location --retry 3 --retry-delay 2 "${GODOT_DOWNLOAD_BASE}/Godot_v${GODOT_VERSION}-${GODOT_STATUS}_macos.universal.zip" -o godot.zip
            unzip -q godot.zip -d godot-bin
            GODOT_BIN="$(find godot-bin -type f -path '*/Godot.app/Contents/MacOS/Godot' | head -n 1)"
            chmod +x "${GODOT_BIN}"
            TEMPLATE_DIR="${HOME}/Library/Application Support/Godot/export_templates/${GODOT_VERSION_DIR}"
          else
            curl --fail --location --retry 3 --retry-delay 2 "${GODOT_DOWNLOAD_BASE}/Godot_v${GODOT_VERSION}-${GODOT_STATUS}_linux.x86_64.zip" -o godot.zip
            unzip -q godot.zip -d godot-bin
            GODOT_BIN="${GITHUB_WORKSPACE}/godot"
            mv godot-bin/Godot_v${GODOT_VERSION}-${GODOT_STATUS}_linux.x86_64 "${GODOT_BIN}"
            chmod +x "${GODOT_BIN}"
            TEMPLATE_DIR="${HOME}/.local/share/godot/export_templates/${GODOT_VERSION_DIR}"
          fi
          echo "GODOT_BIN=${GODOT_BIN}" >> "${GITHUB_ENV}"

          curl --fail --location --retry 3 --retry-delay 2 "${GODOT_DOWNLOAD_BASE}/Godot_v${GODOT_VERSION}-${GODOT_STATUS}_export_templates.tpz" -o export_templates.tpz
          mkdir -p "${TEMPLATE_DIR}" /tmp/godot-export-templates
          unzip -q export_templates.tpz -d /tmp/godot-export-templates
          if [ -d /tmp/godot-export-templates/templates ]; then
            cp -r /tmp/godot-export-templates/templates/. "${TEMPLATE_DIR}/"
          else
            cp -r /tmp/godot-export-templates/. "${TEMPLATE_DIR}/"
          fi

      - name: Configure Android editor settings
        if: matrix.needs_android
        shell: bash
        run: |
          set -euo pipefail
          SETTINGS_DIR="${HOME}/.config/godot"
          mkdir -p "${SETTINGS_DIR}"
          {
            printf '%s\n' '[gd_resource type="EditorSettings" format=3]'
            printf '%s\n' ''
            printf '%s\n' '[resource]'
            printf '%s\n' "export/android/android_sdk_path = \"${ANDROID_HOME}\""
            printf '%s\n' "export/android/java_sdk_path = \"${JAVA_HOME}\""
            printf '%s\n' 'export/android/debug_keystore = ""'
            printf '%s\n' 'export/android/debug_keystore_user = "androiddebugkey"'
            printf '%s\n' 'export/android/debug_keystore_pass = "android"'
          } > "${SETTINGS_DIR}/editor_settings-${GODOT_VERSION}.tres"

      - name: Prepare Android release keystore
        if: matrix.needs_android
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_ALIAS: ${{ secrets.ANDROID_KEYSTORE_ALIAS || 'ci-release' }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD || 'android' }}
        run: |
          set -euo pipefail
          mkdir -p build/ci
          KEYSTORE_PATH="${GITHUB_WORKSPACE}/build/ci/android-release.keystore"
          if [ -n "${ANDROID_KEYSTORE_BASE64}" ]; then
            printf '%s' "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > "${KEYSTORE_PATH}"
          else
            keytool -genkeypair \
              -keystore "${KEYSTORE_PATH}" \
              -storepass "${ANDROID_KEYSTORE_PASSWORD}" \
              -keypass "${ANDROID_KEYSTORE_PASSWORD}" \
              -alias "${ANDROID_KEYSTORE_ALIAS}" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=3D Chinese Mahjong, OU=CI, O=Self Signed, L=CI, S=CI, C=US"
          fi
          echo "GODOT_ANDROID_KEYSTORE_RELEASE_PATH=${KEYSTORE_PATH}" >> "${GITHUB_ENV}"
          echo "GODOT_ANDROID_KEYSTORE_RELEASE_USER=${ANDROID_KEYSTORE_ALIAS}" >> "${GITHUB_ENV}"
          echo "GODOT_ANDROID_KEYSTORE_RELEASE_PASSWORD=${ANDROID_KEYSTORE_PASSWORD}" >> "${GITHUB_ENV}"

      - name: Prepare Apple signing assets
        if: matrix.needs_apple_signing
        shell: bash
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p build/ci
          if [ -n "${APPLE_CERTIFICATE_BASE64}" ]; then
            KEYCHAIN_PATH="${RUNNER_TEMP}/godot-ci-signing.keychain-db"
            security create-keychain -p "" "${KEYCHAIN_PATH}"
            security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
            security unlock-keychain -p "" "${KEYCHAIN_PATH}"
            security default-keychain -s "${KEYCHAIN_PATH}"
            printf '%s' "${APPLE_CERTIFICATE_BASE64}" | base64 --decode > build/ci/apple-signing.p12
            security import build/ci/apple-signing.p12 -k "${KEYCHAIN_PATH}" -P "${APPLE_CERTIFICATE_PASSWORD}" -A -t cert -f pkcs12
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" "${KEYCHAIN_PATH}"
          fi
          if [ -n "${IOS_PROVISIONING_PROFILE_BASE64}" ]; then
            mkdir -p "${HOME}/Library/MobileDevice/Provisioning Profiles"
            printf '%s' "${IOS_PROVISIONING_PROFILE_BASE64}" | base64 --decode > "${HOME}/Library/MobileDevice/Provisioning Profiles/godot-ci.mobileprovision"
          fi

      - name: Show Godot version
        shell: bash
        run: '"${GODOT_BIN}" --version'

      - name: Generate product changelog
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/ci/make_release_changelog.py \
            --tag "${GITHUB_REF_NAME}" \
            --output build/release-info/PRODUCT_CHANGELOG.md \
            --release-notes build/release-info/RELEASE_NOTES.md

      - name: Configure export presets for CI
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/ci/configure_export_presets.py --tag "${GITHUB_REF_NAME}"

      - name: Export ${{ matrix.name }}
        shell: bash
        run: |
          set -euo pipefail
          SAFE_TAG="$(printf '%s' "${GITHUB_REF_NAME}" | tr '/ ' '--' | tr -cd 'A-Za-z0-9._-')"
          EXPORT_DIR="$(dirname "${{ matrix.export_path }}")"
          LOG_PATH="dist/${PRODUCT_SLUG}-${SAFE_TAG}-${{ matrix.package_suffix }}.log"
          mkdir -p "${EXPORT_DIR}" dist

          {
            echo "Tag: ${GITHUB_REF_NAME}"
            echo "Preset: ${{ matrix.preset }}"
            echo "Export path: ${{ matrix.export_path }}"
            echo "Allow failure: ${{ matrix.allow_failure }}"
            echo
            echo "Godot version:"
            "${GODOT_BIN}" --version
            echo
            echo "Importing resources..."
            "${GODOT_BIN}" --headless --path . --import --quit-after 2
            echo
            echo "Exporting ${{ matrix.name }}..."
            "${GODOT_BIN}" --headless --path . --export-release "${{ matrix.preset }}" "${{ matrix.export_path }}"
            if [ "${{ matrix.name }}" = "Linux" ]; then
              chmod +x "${{ matrix.export_path }}"
            fi
            cp build/release-info/PRODUCT_CHANGELOG.md "${EXPORT_DIR}/PRODUCT_CHANGELOG.md"
            cp build/release-info/RELEASE_NOTES.md "${EXPORT_DIR}/RELEASE_NOTES.md"
            echo
            echo "Exported files:"
            find "${EXPORT_DIR}" -maxdepth 3 -type f -print | sort
          } 2>&1 | tee "${LOG_PATH}"

      - name: Try to build iOS IPA
        if: matrix.name == 'iOS'
        shell: bash
        run: |
          set -euo pipefail
          SAFE_TAG="$(printf '%s' "${GITHUB_REF_NAME}" | tr '/ ' '--' | tr -cd 'A-Za-z0-9._-')"
          EXPORT_DIR="$(dirname "${{ matrix.export_path }}")"
          SCHEME="$(basename "${{ matrix.export_path }}" .zip)"
          PROJECT_PATH="${EXPORT_DIR}/${SCHEME}.xcodeproj"
          IPA_DIR="${EXPORT_DIR}/ipa"
          LOG_PATH="dist/${PRODUCT_SLUG}-${SAFE_TAG}-${{ matrix.package_suffix }}-ipa.log"
          mkdir -p "${IPA_DIR}" dist

          {
            echo "Trying iOS IPA build."
            echo "Project: ${PROJECT_PATH}"
            echo "Scheme: ${SCHEME}"
            echo "Note: simulator builds are not enabled because this Godot project uses the Mobile renderer."
            if [ "${IOS_BUILD_IPA}" != "true" ]; then
              echo "IOS_BUILD_IPA is not true; skipping IPA build."
              exit 0
            fi
            if [ ! -d "${PROJECT_PATH}" ]; then
              echo "Xcode project was not found; skipping IPA build."
              exit 0
            fi
            {
              printf '%s\n' '<?xml version="1.0" encoding="UTF-8"?>'
              printf '%s\n' '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">'
              printf '%s\n' '<plist version="1.0">'
              printf '%s\n' '<dict>'
              printf '%s\n' '  <key>method</key>'
              printf '%s\n' '  <string>ad-hoc</string>'
              printf '%s\n' '  <key>signingStyle</key>'
              printf '%s\n' '  <string>automatic</string>'
              printf '%s\n' '  <key>teamID</key>'
              printf '%s\n' "  <string>${APPLE_TEAM_ID}</string>"
              printf '%s\n' '  <key>compileBitcode</key>'
              printf '%s\n' '  <false/>'
              printf '%s\n' '</dict>'
              printf '%s\n' '</plist>'
            } > "${IPA_DIR}/ExportOptions.plist"
            if xcodebuild \
              -project "${PROJECT_PATH}" \
              -scheme "${SCHEME}" \
              -configuration Release \
              -sdk iphoneos \
              -destination "generic/platform=iOS" \
              archive \
              -archivePath "${IPA_DIR}/${SCHEME}.xcarchive" \
              -allowProvisioningUpdates; then
              xcodebuild \
                -exportArchive \
                -archivePath "${IPA_DIR}/${SCHEME}.xcarchive" \
                -exportOptionsPlist "${IPA_DIR}/ExportOptions.plist" \
                -exportPath "${IPA_DIR}" \
                -allowProvisioningUpdates
            else
              echo "IPA archive failed; Xcode project asset will still be packaged."
            fi
            find "${IPA_DIR}" -maxdepth 3 -type f -print | sort || true
          } 2>&1 | tee "${LOG_PATH}"

      - name: Package ${{ matrix.name }}
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          SAFE_TAG="$(printf '%s' "${GITHUB_REF_NAME}" | tr '/ ' '--' | tr -cd 'A-Za-z0-9._-')"
          EXPORT_DIR="$(dirname "${{ matrix.export_path }}")"
          PACKAGE_PATH="dist/${PRODUCT_SLUG}-${SAFE_TAG}-${{ matrix.package_suffix }}.zip"
          mkdir -p dist
          if [ -d "${EXPORT_DIR}" ] && find "${EXPORT_DIR}" -mindepth 1 -print -quit | grep -q .; then
            (cd "${EXPORT_DIR}" && zip -qr "${GITHUB_WORKSPACE}/${PACKAGE_PATH}" .)
            echo "Packaged ${PACKAGE_PATH}"
          else
            echo "No exported files found in ${EXPORT_DIR}; package skipped."
          fi

      - name: Upload ${{ matrix.name }} package and log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PRODUCT_SLUG }}-${{ matrix.package_suffix }}-build
          path: dist/${{ env.PRODUCT_SLUG }}-*
          if-no-files-found: warn

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: export-release
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download exported packages and logs
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate release notes asset
        shell: bash
        run: |
          set -euo pipefail
          SAFE_TAG="$(printf '%s' "${GITHUB_REF_NAME}" | tr '/ ' '--' | tr -cd 'A-Za-z0-9._-')"
          mkdir -p release-assets
          python3 scripts/ci/make_release_changelog.py \
            --tag "${GITHUB_REF_NAME}" \
            --output "release-assets/PRODUCT_CHANGELOG-${SAFE_TAG}.md" \
            --release-notes release-notes.md

      - name: List release assets
        run: find release-assets -maxdepth 2 -type f -print | sort

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(release-assets/*)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets were produced."
            exit 1
          fi

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --notes-file release-notes.md
          else
            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --notes-file release-notes.md
          fi

          gh release upload "${GITHUB_REF_NAME}" "${assets[@]}" --clobber
